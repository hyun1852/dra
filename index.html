<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 프로젝트 포트폴리오</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        h1 {
            margin-bottom: 50px;
            font-size: 3rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }
        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 250px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .card i {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }
        .card h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }
        .card p {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <h1>My Fun Projects</h1>
    
    <div class="container">
        <!-- 계산기 카드 -->
        <a href="./calculator/" class="card">
            <i>🔢</i>
            <h2>계산기</h2>
            <p>다크 모드 지원하는 깔끔한 계산기</p>
        </a>

        <!-- 웃음 버튼 카드 -->
        <a href="./something_funny/" class="card">
            <i>🤣</i>
            <h2>웃음 버튼</h2>
            <p>스트레스 풀리는 재미있는 효과</p>
        </a>

        <!-- JoHoo, Love you 카드 -->
        <a href="./JoHoo_Love_you/" class="card">
            <i>💌</i>
            <h2>JoHoo Puzzle</h2>
            <p>달콤한 메시지를 맞춰보세요</p>
        </a>
    </div>

    <div class="footer">
        © 2024 Created by hyun1852
    </div>
</body>
</html>
