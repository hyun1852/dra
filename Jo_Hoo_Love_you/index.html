<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jo Hoo, Love you Puzzle</title>
    <style>
        :root {
            --primary-pink: #ff8fab;
            --soft-pink: #ffc2d1;
            --heart-red: #ff4d6d;
            --bg-color: #fff0f3;
        }

        body {
            font-family: 'Nanum Pen Script', 'Comic Sans MS', cursive;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background 1s ease;
        }

        body.winner {
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
        }

        h1 {
            color: var(--heart-red);
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            transition: all 0.5s ease;
        }

        #puzzle-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 143, 171, 0.3);
            border: 4px solid var(--soft-pink);
            max-width: 90%;
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .winner #puzzle-container {
            transform: scale(1.1);
            border-color: #ff4d6d;
            box-shadow: 0 20px 50px rgba(255, 77, 109, 0.5);
        }

        .slots {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 60px;
            width: 100%;
        }

        .slot {
            width: 50px;
            height: 60px;
            border-bottom: 3px solid var(--soft-pink);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: var(--heart-red);
            font-weight: bold;
        }

        .letters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .letter-tile {
            width: 50px;
            height: 60px;
            background-color: var(--primary-pink);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0px #fb6f92;
            transition: all 0.2s;
            user-select: none;
        }

        .letter-tile:hover {
            transform: scale(1.1);
            background-color: #fb6f92;
        }

        .letter-tile.used {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }

        /* Dramatic Success Message */
        #success-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 255, 255, 0.9);
            padding: 50px 100px;
            border-radius: 50px;
            text-align: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 0 100px rgba(255, 77, 109, 0.5);
            border: 10px solid var(--primary-pink);
        }

        #success-banner.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        #success-banner h2 {
            font-size: 4rem;
            color: var(--heart-red);
            margin: 0;
            animation: bounce 1s infinite;
        }

        #success-banner p {
            font-size: 2rem;
            color: #ff8fab;
            margin: 10px 0 0 0;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Particle Canvas */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .reset-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: var(--soft-pink);
            border: none;
            border-radius: 20px;
            color: var(--heart-red);
            cursor: pointer;
            font-weight: bold;
            z-index: 200;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <h1 id="main-title">💌 Puzzle for You</h1>

    <div id="puzzle-container">
        <div class="slots" id="slots"></div>
        <div class="letters" id="letters"></div>
        <button class="reset-btn" onclick="location.reload()">다시 하기</button>
    </div>

    <div id="success-banner">
        <h2>Jo Hoo is the BEST! 👑</h2>
        <p>세상에서 제일 멋진 조후님, 축하해요!</p>
    </div>

    <script>
        const targetText = "Jo Hoo, Love you";
        const targetArray = targetText.split("");
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initGame() {
            const slotsContainer = document.getElementById('slots');
            const lettersContainer = document.getElementById('letters');
            
            slotsContainer.innerHTML = '';
            lettersContainer.innerHTML = '';

            targetArray.forEach((char, index) => {
                const slot = document.createElement('div');
                slot.className = 'slot';
                if (char === " ") {
                    slot.style.border = 'none';
                    slot.innerText = "\u00A0";
                } else if (char === ",") {
                    slot.innerText = ",";
                    slot.style.border = 'none';
                }
                slot.id = `slot-${index}`;
                slotsContainer.appendChild(slot);
            });

            const playableLetters = targetArray
                .map((char, index) => ({ char, index }))
                .filter(item => item.char !== " " && item.char !== ",");

            const shuffledLetters = [...playableLetters].sort(() => Math.random() - 0.5);

            shuffledLetters.forEach((item) => {
                const tile = document.createElement('div');
                tile.className = 'letter-tile';
                tile.innerText = item.char;
                tile.onclick = () => handleTileClick(tile, item.char);
                lettersContainer.appendChild(tile);
            });
        }

        function handleTileClick(tile, char) {
            const nextEmptyIndex = targetArray.findIndex((c, i) => {
                const slot = document.getElementById(`slot-${i}`);
                return c !== " " && c !== "," && slot.innerText === "";
            });

            if (nextEmptyIndex !== -1) {
                const slot = document.getElementById(`slot-${nextEmptyIndex}`);
                if (char === targetArray[nextEmptyIndex]) {
                    slot.innerText = char;
                    tile.classList.add('used');
                    checkWin();
                } else {
                    tile.style.backgroundColor = '#ff4d6d';
                    setTimeout(() => { tile.style.backgroundColor = ''; }, 300);
                }
            }
        }

        function checkWin() {
            const currentText = Array.from(document.querySelectorAll('.slot'))
                .map(slot => slot.innerText === "\u00A0" ? " " : slot.innerText)
                .join("");

            if (currentText === targetText) {
                showCelebration();
            }
        }

        // Web Audio Fanfare
        function playFanfare() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const playNote = (freq, start, duration) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, start);
                gain.gain.setValueAtTime(0.1, start);
                gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(start);
                osc.stop(start + duration);
            };

            const now = audioCtx.currentTime;
            playNote(261.63, now, 0.1); // C4
            playNote(329.63, now + 0.15, 0.1); // E4
            playNote(392.00, now + 0.3, 0.1); // G4
            playNote(523.25, now + 0.45, 0.5); // C5
        }

        // Fireworks/Particle Animation
        class Particle {
            constructor() {
                this.x = window.innerWidth / 2;
                this.y = window.innerHeight / 2;
                this.size = Math.random() * 15 + 5;
                this.speedX = Math.random() * 10 - 5;
                this.speedY = Math.random() * 10 - 5;
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.type = Math.random() > 0.5 ? 'heart' : 'star';
                this.opacity = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.1; // gravity
                this.opacity -= 0.01;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.font = `${this.size}px Arial`;
                ctx.fillText(this.type === 'heart' ? '❤️' : '✨', this.x, this.y);
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.opacity <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }

        function showCelebration() {
            document.body.classList.add('winner');
            document.getElementById('success-banner').classList.add('show');
            document.getElementById('main-title').style.transform = 'translateY(-200px)';
            
            playFanfare();
            
            // Create burst of particles
            for(let i=0; i<150; i++) {
                setTimeout(() => particles.push(new Particle()), Math.random() * 500);
            }

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            animate();
        }

        initGame();
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
